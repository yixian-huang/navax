name: 功能建议 / Feature request
description: 提出新功能或改进 / Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 / Problem to solve
      description: 你遇到了什么限制或痛点 / What limitation or pain point are you hitting
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案 / Alternatives considered
  - type: markdown
    attributes:
      value: |
        提示:本项目刻意不引入 ORM、DI 框架、事件总线、Redis、队列和 PostgreSQL(见 CONTRIBUTING.md 架构边界)。
        Note: this project deliberately avoids ORMs, DI frameworks, event buses, Redis, queues, and PostgreSQL (see CONTRIBUTING.md).
