name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Static checks
        run: make check
      - name: Tests
        run: make test
      - name: Contract tests
        run: make test-contract
      - name: Embedded production build
        run: make build VERSION="${GITHUB_SHA::12}" COMMIT="${GITHUB_SHA}" DEPLOYMENT=development
      - name: Smoke-test binary
        run: test -x bin/navax

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Embedded production build
        run: make build VERSION="${GITHUB_SHA::12}" COMMIT="${GITHUB_SHA}" DEPLOYMENT=development
      - name: Install Playwright
        run: |
          cd tests/e2e && npm install
          npx playwright install --with-deps chromium
      - name: Run E2E
        run: cd tests/e2e && npx playwright test
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: |
          docker build \
            --build-arg VERSION=ci \
            --build-arg COMMIT="$GITHUB_SHA" \
            --build-arg BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg DEPLOYMENT=container \
            -t navax:ci .
      - name: Smoke-test non-root container
        run: |
          docker run -d --rm --name navax-ci \
            --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL --security-opt no-new-privileges:true \
            -p 127.0.0.1:18080:8080 \
            -e PUBLIC_BASE_URL=http://127.0.0.1:18080 \
            -e NAVAX_SETUP_TOKEN=0123456789abcdef0123456789abcdef \
            navax:ci
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/readyz >/dev/null; then break; fi
            if [ "$attempt" -eq 30 ]; then docker logs navax-ci; exit 1; fi
            sleep 1
          done
          test "$(docker inspect --format '{{.Config.User}}' navax-ci)" = "10001:10001"
          curl -fsS http://127.0.0.1:18080/api/v1/version | grep -q '"deployment":"container"'
      - name: Stop smoke-test container
        if: always()
        run: docker rm -f navax-ci >/dev/null 2>&1 || true

  # Production CD: after all gates pass on main, trigger NoPanel artifact deploy
  # (build on Alpha VPS → transfer → activate-artifact.sh on VIP Cloud).
  deploy-production:
    needs: [verify, e2e, container]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production
    permissions:
      contents: read
    steps:
      - name: Trigger NoPanel production deploy
        env:
          NPC_API_KEY: ${{ secrets.NPC_API_KEY }}
          GIT_REF: ${{ github.sha }}
          DEPLOY_HOOK_URL: https://ops.nopanel.dev/api/v1/deploy-hooks/ddaf0219-d11b-466f-9188-5429118c072d/production
        run: |
          set -euo pipefail
          if [ -z "${NPC_API_KEY:-}" ]; then
            echo "::error::GitHub secret NPC_API_KEY is not set. Mint a NoPanel API key and add it as a repository secret."
            exit 1
          fi
          echo "Triggering deploy for gitRef=${GIT_REF}"
          response="$(curl -fsS -X POST "$DEPLOY_HOOK_URL" \
            -H "X-API-Key: ${NPC_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"gitRef\":\"${GIT_REF}\"}")"
          echo "$response" | tee /tmp/deploy-hook.json
          deployment_id="$(python3 -c 'import json; d=json.load(open("/tmp/deploy-hook.json")); d=d.get("data",d) if isinstance(d,dict) else {}; print(d.get("id") or d.get("deploymentId") or d.get("deployment_id") or "")')"
          if [ -z "$deployment_id" ]; then
            echo "::error::Deploy hook did not return a deployment id: $response"
            exit 1
          fi
          echo "deployment_id=${deployment_id}"
          echo "DEPLOYMENT_ID=${deployment_id}" >> "$GITHUB_ENV"

      - name: Wait for deployment success
        env:
          NPC_API_KEY: ${{ secrets.NPC_API_KEY }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while [ "$SECONDS" -lt "$deadline" ]; do
            body="$(curl -fsS "https://ops.nopanel.dev/api/v1/deployments/${DEPLOYMENT_ID}" \
              -H "X-API-Key: ${NPC_API_KEY}" \
              -H "Accept: application/json")"
            status="$(printf '%s' "$body" | python3 -c 'import json,sys; d=json.load(sys.stdin); d=d.get("data",d) if isinstance(d,dict) else {}; print(d.get("status") or "")')"
            step="$(printf '%s' "$body" | python3 -c 'import json,sys; d=json.load(sys.stdin); d=d.get("data",d) if isinstance(d,dict) else {}; print(d.get("currentStep") or d.get("currentPhase") or "")')"
            echo "status=${status} step=${step}"
            case "$status" in
              success|succeeded|healthy|done)
                echo "Deploy succeeded"
                exit 0
                ;;
              failed|error|cancelled|canceled|rolled_back|rollback_failed)
                echo "::error::Deploy failed with status=${status}"
                printf '%s\n' "$body" | python3 -m json.tool || printf '%s\n' "$body"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Timed out waiting for deployment ${DEPLOYMENT_ID}"
          exit 1
