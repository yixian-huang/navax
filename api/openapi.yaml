        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: navax_session
  parameters:
    IfNoneMatch: { in: header, name: If-None-Match, schema: { type: string } }
    IdempotencyKey: { in: header, name: Idempotency-Key, required: true, schema: { type: string, minLength: 16, maxLength: 128 } }
    Page: { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
    PageSize: { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Search: { in: query, name: search, schema: { type: string, maxLength: 100 } }
    Period: { in: query, name: period, schema: { type: integer, enum: [7, 30, 90], default: 30 } }
    PageId: { in: path, name: pageId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    UserId: { in: path, name: userId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    SessionId: { in: path, name: sessionId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    CategoryId: { in: path, name: categoryId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    SiteId: { in: path, name: siteId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    InvitationId: { in: path, name: invitationId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    ThemeId: { in: path, name: themeId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    BackupId: { in: path, name: backupId, required: true, schema: { $ref: '#/components/schemas/Id' } }
    Slug: { in: path, name: slug, required: true, schema: { type: string, pattern: '^[a-z0-9](?:[a-z0-9-]{1,46}[a-z0-9])$', minLength: 3, maxLength: 48 } }
    ProviderKind: { in: path, name: kind, required: true, schema: { type: string, enum: [smtp, storage, dns] } }

  responses:
    ErrorResponse:
      description: 统一错误响应
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    EmptyResponse: { description: 操作成功, content: { application/json: { schema: { $ref: '#/components/schemas/EmptyEnvelope' } } } }
    HealthResponse: { description: 健康状态, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
    VersionResponse: { description: 版本信息, content: { application/json: { schema: { $ref: '#/components/schemas/VersionEnvelope' } } } }
    BootstrapStatusResponse: { description: 初始化状态, content: { application/json: { schema: { $ref: '#/components/schemas/BootstrapStatusEnvelope' } } } }
    PublicConfigResponse: { description: 公开实例配置, content: { application/json: { schema: { $ref: '#/components/schemas/PublicConfigEnvelope' } } } }
    AuthSessionResponse: { description: 当前认证状态, content: { application/json: { schema: { $ref: '#/components/schemas/AuthSessionEnvelope' } } } }
    InvitationValidationResponse: { description: 邀请校验结果, content: { application/json: { schema: { $ref: '#/components/schemas/InvitationValidationEnvelope' } } } }
    UserResponse: { description: 用户, content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } } }
    SessionsResponse: { description: 会话列表, content: { application/json: { schema: { $ref: '#/components/schemas/SessionsEnvelope' } } } }
    NavigationPageResponse: { description: 导航页草稿, content: { application/json: { schema: { $ref: '#/components/schemas/NavigationPageEnvelope' } } } }
    PublishedPageResponse:
      description: 公开导航快照
      headers:
        ETag: { schema: { type: string } }
        Cache-Control: { schema: { type: string } }
      content: { application/json: { schema: { $ref: '#/components/schemas/PublishedPageEnvelope' } } }
    CategoriesResponse: { description: 分类列表, content: { application/json: { schema: { $ref: '#/components/schemas/CategoriesEnvelope' } } } }
    CategoryResponse: { description: 分类, content: { application/json: { schema: { $ref: '#/components/schemas/CategoryEnvelope' } } } }
    SitesResponse: { description: 站点列表, content: { application/json: { schema: { $ref: '#/components/schemas/SitesEnvelope' } } } }
    SiteResponse: { description: 站点, content: { application/json: { schema: { $ref: '#/components/schemas/SiteEnvelope' } } } }
    RevisionResponse: { description: 草稿版本, content: { application/json: { schema: { $ref: '#/components/schemas/RevisionEnvelope' } } } }
    PageSettingsResponse: { description: 页面设置, content: { application/json: { schema: { $ref: '#/components/schemas/PageSettingsEnvelope' } } } }
    PublicationResponse: { description: 发布状态, content: { application/json: { schema: { $ref: '#/components/schemas/PublicationEnvelope' } } } }
    ThemesResponse: { description: 主题列表, content: { application/json: { schema: { $ref: '#/components/schemas/ThemesEnvelope' } } } }
    ThemeResponse: { description: 主题, content: { application/json: { schema: { $ref: '#/components/schemas/ThemeEnvelope' } } } }
    DiscoverResponse: { description: 发现页, content: { application/json: { schema: { $ref: '#/components/schemas/DiscoverEnvelope' } } } }
    DirectoryResponse: { description: 公共目录站点, content: { application/json: { schema: { $ref: '#/components/schemas/DirectoryEnvelope' } } } }
    DirectoryCategoriesResponse: { description: 公共目录分类, content: { application/json: { schema: { $ref: '#/components/schemas/DirectoryCategoriesEnvelope' } } } }
    DirectoryCategoryResponse: { description: 公共目录分类, content: { application/json: { schema: { $ref: '#/components/schemas/DirectoryCategoryEnvelope' } } } }
    DirectorySiteResponse: { description: 公共目录站点, content: { application/json: { schema: { $ref: '#/components/schemas/DirectorySiteEnvelope' } } } }
    ImportPreviewResponse: { description: 导入预检, content: { application/json: { schema: { $ref: '#/components/schemas/ImportPreviewEnvelope' } } } }
    ImportResultResponse: { description: 导入结果, content: { application/json: { schema: { $ref: '#/components/schemas/ImportResultEnvelope' } } } }
    LinkCheckResponse: { description: 链接检查结果, content: { application/json: { schema: { $ref: '#/components/schemas/LinkCheckEnvelope' } } } }
    AssetResponse: { description: 上传资源, content: { application/json: { schema: { $ref: '#/components/schemas/AssetEnvelope' } } } }
    SubdomainResponse: { description: 子域名申请；无申请时 data 为 null, content: { application/json: { schema: { $ref: '#/components/schemas/SubdomainEnvelope' } } } }
    SubdomainsResponse: { description: 子域名申请列表, content: { application/json: { schema: { $ref: '#/components/schemas/SubdomainsEnvelope' } } } }
    AnalyticsOverviewResponse: { description: 统计概览, content: { application/json: { schema: { $ref: '#/components/schemas/AnalyticsOverviewEnvelope' } } } }
    AnalyticsTrendsResponse: { description: 统计趋势, content: { application/json: { schema: { $ref: '#/components/schemas/AnalyticsTrendsEnvelope' } } } }
    AnalyticsBreakdownResponse: { description: 统计分布, content: { application/json: { schema: { $ref: '#/components/schemas/AnalyticsBreakdownEnvelope' } } } }
    AdminOverviewResponse: { description: 管理概览, content: { application/json: { schema: { $ref: '#/components/schemas/AdminOverviewEnvelope' } } } }
    UsersResponse: { description: 用户列表, content: { application/json: { schema: { $ref: '#/components/schemas/UsersEnvelope' } } } }
    InvitationsResponse: { description: 邀请列表, content: { application/json: { schema: { $ref: '#/components/schemas/InvitationsEnvelope' } } } }
    InvitationResponse: { description: 邀请, content: { application/json: { schema: { $ref: '#/components/schemas/InvitationEnvelope' } } } }
    InvitationCreatedResponse: { description: 新建邀请，仅此响应返回完整 token, content: { application/json: { schema: { $ref: '#/components/schemas/InvitationCreatedEnvelope' } } } }
    SystemSettingsResponse: { description: 系统设置, content: { application/json: { schema: { $ref: '#/components/schemas/SystemSettingsEnvelope' } } } }
    AdminLinksResponse: { description: 全站链接, content: { application/json: { schema: { $ref: '#/components/schemas/AdminLinksEnvelope' } } } }
    AuditResponse: { description: 审计日志, content: { application/json: { schema: { $ref: '#/components/schemas/AuditEnvelope' } } } }
    ProvidersResponse: { description: 服务配置摘要, content: { application/json: { schema: { $ref: '#/components/schemas/ProvidersEnvelope' } } } }
    ProviderResponse: { description: 服务配置，秘密永不回传, content: { application/json: { schema: { $ref: '#/components/schemas/ProviderEnvelope' } } } }
    ProviderTestResponse: { description: 连接测试结果, content: { application/json: { schema: { $ref: '#/components/schemas/ProviderTestEnvelope' } } } }
    UpdateStateResponse: { description: 更新状态, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateStateEnvelope' } } } }
    BackupsResponse: { description: 备份列表, content: { application/json: { schema: { $ref: '#/components/schemas/BackupsEnvelope' } } } }
    BackupResponse: { description: 备份, content: { application/json: { schema: { $ref: '#/components/schemas/BackupEnvelope' } } } }
    RestoreTokenResponse: { description: 一次性恢复令牌, content: { application/json: { schema: { $ref: '#/components/schemas/RestoreTokenEnvelope' } } } }

  schemas:
    Id: { type: string, minLength: 8, maxLength: 64 }
    ThemeId:
      type: string
      description: 主题包 slug，如 slate、slate-dark。
      pattern: '^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$'
      minLength: 1
      maxLength: 64
    Timestamp: { type: string, format: date-time }
    ResponseMeta:
      type: object
      required: [requestId]
      properties:
        requestId: { type: string }
        message: { type: string }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    ErrorMeta:
      allOf:
        - $ref: '#/components/schemas/ResponseMeta'
        - type: object
          required: [message]
          properties:
            message: { type: string }
            detail: { type: string }
            fields: { type: object, additionalProperties: { type: string } }
    ErrorEnvelope:
      type: object
      required: [code, data, meta]
      properties:
        code: { type: string, enum: [MALFORMED_REQUEST, VALIDATION_FAILED, AUTH_REQUIRED, INVALID_CREDENTIALS, SESSION_EXPIRED, FORBIDDEN, ADMIN_REQUIRED, ACCOUNT_DISABLED, NOT_FOUND, INSTANCE_ALREADY_INITIALIZED, EMAIL_CONFLICT, USERNAME_CONFLICT, SLUG_CONFLICT, CATEGORY_NOT_EMPTY, INVITATION_EXPIRED, INVITATION_REVOKED, INVITATION_EXHAUSTED, DRAFT_REVISION_MISMATCH, IMPORT_TOO_LARGE, INVALID_URL, IMPORT_INVALID, RATE_LIMITED, SETUP_REQUIRED, SERVICE_UNAVAILABLE, CONFLICT, INTERNAL_ERROR] }
        data: { type: 'null' }
        meta: { $ref: '#/components/schemas/ErrorMeta' }
    EmptyEnvelope:
      type: object
      required: [code, data, meta]
      properties:
        code: { const: OK }
        data: { type: 'null' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [healthy, degraded] }
        checks: { type: object, additionalProperties: { type: string } }
    VersionInfo:
      type: object
      required: [version, commit, builtAt, goVersion, deployment]
      properties:
        version: { type: string }
        commit: { type: string }
        builtAt: { $ref: '#/components/schemas/Timestamp' }
        goVersion: { type: string }
        deployment: { type: string, enum: [binary, container, development] }
    BootstrapStatus:
      type: object
      required: [initialized, setupRequired, version, instanceName]
      properties:
        initialized: { type: boolean }
        setupRequired: { type: boolean }
        version: { type: string }
        instanceName: { type: string }
        publicBaseUrl: { type: [string, 'null'], format: uri }
    BootstrapRequest:
      type: object
      required: [adminUsername, adminEmail, adminPassword, instanceName, publicBaseUrl]
      properties:
        adminUsername: { type: string, pattern: '^[a-zA-Z0-9_-]{3,32}$' }
        adminEmail: { type: string, format: email, maxLength: 254 }
        adminPassword: { type: string, format: password, minLength: 12, maxLength: 1024 }
        instanceName: { type: string, minLength: 1, maxLength: 60 }
        publicBaseUrl: { type: string, format: uri, maxLength: 2048 }
    PublicConfig:
      type: object
      required: [instanceName, publicBaseUrl, registrationMode, features, limits]
      properties:
        instanceName: { type: string }
        publicBaseUrl: { type: string, format: uri }
        rootDomain: { type: [string, 'null'] }
        registrationMode: { type: string, enum: [invite, closed] }
        features:
          type: object
          required: [discover, analytics, subdomains]
          properties:
            discover: { type: boolean }
            analytics: { type: boolean }
            subdomains: { type: boolean }
        limits: { $ref: '#/components/schemas/Limits' }
    Role: { type: string, enum: [user, admin] }
    UserStatus: { type: string, enum: [active, disabled] }
    User:
      type: object
      required: [id, username, email, avatarUrl, bio, role, status, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        username: { type: string }
        email: { type: string, format: email }
        avatarUrl: { type: string }
        bio: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        status: { $ref: '#/components/schemas/UserStatus' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
    AuthSession:
      type: object
      required: [authenticated, user]
      properties:
        authenticated: { type: boolean }
        user: { oneOf: [{ $ref: '#/components/schemas/User' }, { type: 'null' }] }
        expiresAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, format: password, minLength: 1, maxLength: 1024 }
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, pattern: '^[a-zA-Z0-9_-]{3,32}$' }
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, format: password, minLength: 12, maxLength: 1024 }
    InvitationValidation:
      type: object
      required: [valid, inviterName, expiresAt]
      properties:
        valid: { const: true }
        inviterName: { type: string }
        expiresAt: { $ref: '#/components/schemas/Timestamp' }
    ProfilePatch:
      type: object
      properties:
        username: { type: string, pattern: '^[a-zA-Z0-9_-]{3,32}$' }
        bio: { type: string, maxLength: 300 }
        avatarUrl: { type: string, maxLength: 2048 }
      minProperties: 1
    PasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, format: password, minLength: 1, maxLength: 1024 }
        newPassword: { type: string, format: password, minLength: 12, maxLength: 1024 }
        revokeOtherSessions: { type: boolean, default: true }
    SessionInfo:
      type: object
      required: [id, current, device, createdAt, lastSeenAt, expiresAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        current: { type: boolean }
        device: { type: string }
        approximateLocation: { type: string }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        lastSeenAt: { $ref: '#/components/schemas/Timestamp' }
        expiresAt: { $ref: '#/components/schemas/Timestamp' }
    PageKind: { type: string, enum: [personal, system] }
    Visibility: { type: string, enum: [private, unlisted, public] }
    Density: { type: string, enum: [list, compact, comfortable] }
    LayoutTemplate: { type: string, enum: [full, search-focus, browse-first, sidebar] }
    Category:
      type: object
      required: [id, pageId, name, icon, sortOrder, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        pageId: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        icon: { type: string }
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
    Site:
      type: object
      required: [id, categoryId, title, url, icon, description, sortOrder, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        categoryId: { $ref: '#/components/schemas/Id' }
        title: { type: string }
        url: { type: string, format: uri }
        icon: { type: string }
        description: { type: string }
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
    PublicCategory:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          required: [sites]
          properties:
            sites: { type: array, items: { $ref: '#/components/schemas/Site' } }
    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 60 }
        icon: { type: string, maxLength: 256, default: '' }
    CategoryPatch:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 60 }
        icon: { type: string, maxLength: 256 }
      minProperties: 1
    SiteInput:
      type: object
      required: [categoryId, title, url]
      properties:
        categoryId: { $ref: '#/components/schemas/Id' }
        title: { type: string, minLength: 1, maxLength: 100 }
        url: { type: string, format: uri, pattern: '^https?://' }
        icon: { type: string, maxLength: 2048, default: '' }
        description: { type: string, maxLength: 300, default: '' }
    SitePatch:
      type: object
      properties:
        categoryId: { $ref: '#/components/schemas/Id' }
        title: { type: string, minLength: 1, maxLength: 100 }
        url: { type: string, format: uri, pattern: '^https?://' }
        icon: { type: string, maxLength: 2048 }
        description: { type: string, maxLength: 300 }
      minProperties: 1
    PageSettings:
      type: object
      required: [layout, appearance, search, display, preferences]
      properties:
        layout:
          type: object
          required: [template, density, columns, categoryStyle]
          properties:
            template: { $ref: '#/components/schemas/LayoutTemplate' }
            density: { $ref: '#/components/schemas/Density' }
            columns: { type: integer, minimum: 1, maximum: 8 }
            categoryStyle: { type: string, enum: [tabs, sidebar, grid] }
        appearance:
          type: object
          required: [themeId, background]
          properties:
            themeId: { $ref: '#/components/schemas/ThemeId' }
            background:
              type: object
              required: [type, value, opacity]
              properties:
                type: { type: string, enum: [none, color, gradient, image] }
                value: { type: string, maxLength: 2048 }
                opacity: { type: number, minimum: 0, maximum: 1 }
        search:
          type: object
          required: [defaultEngine, showEngineSelector]
          properties:
            defaultEngine: { type: string, enum: [google, bing, duckduckgo, baidu] }
            showEngineSelector: { type: boolean }
        display:
          type: object
          required: [showClock, showDate, showGreeting]
          properties:
            showClock: { type: boolean }
            showDate: { type: boolean }
            showGreeting: { type: boolean }
        preferences:
          type: object
          required: [locale, timezone, openLinksInNewTab]
          properties:
            locale: { type: string, maxLength: 20 }
            timezone: { type: string, maxLength: 80 }
            openLinksInNewTab: { type: boolean }
    PageSettingsUpdate:
      allOf:
        - $ref: '#/components/schemas/PageSettings'
        - type: object
          required: [expectedRevision]
          properties:
            expectedRevision: { type: integer, minimum: 0 }
    PagePatch:
      type: object
      required: [expectedRevision]
      properties:
        expectedRevision: { type: integer, minimum: 0 }
        title: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 300 }
      minProperties: 2
    NavigationPage:
      type: object
      required: [id, kind, ownerId, ownerName, title, description, draftRevision, settings, categories, sites, publication, draftUpdatedAt, createdAt, updatedAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        kind: { $ref: '#/components/schemas/PageKind' }
        ownerId: { oneOf: [{ $ref: '#/components/schemas/Id' }, { type: 'null' }] }
        ownerName: { type: string }
        title: { type: string }
        description: { type: string }
        draftRevision: { type: integer, minimum: 0 }
        settings: { $ref: '#/components/schemas/PageSettings' }
        categories: { type: array, items: { $ref: '#/components/schemas/Category' } }
        sites: { type: array, items: { $ref: '#/components/schemas/Site' } }
        publication: { $ref: '#/components/schemas/Publication' }
        draftUpdatedAt: { $ref: '#/components/schemas/Timestamp' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
    ContentOrderRequest:
      type: object
      required: [expectedRevision, categories]
      properties:
        expectedRevision: { type: integer, minimum: 0 }
        categories:
          type: array
          maxItems: 50
          items:
            type: object
            required: [id, siteIds]
            properties:
              id: { $ref: '#/components/schemas/Id' }
              siteIds: { type: array, maxItems: 1000, uniqueItems: true, items: { $ref: '#/components/schemas/Id' } }
    Publication:
      type: object
      required: [visibility, slug, showAuthor, published, hasUnpublishedChanges]
      properties:
        visibility: { $ref: '#/components/schemas/Visibility' }
        slug: { type: string }
        showAuthor: { type: boolean }
        seoTitle: { type: string }
        seoDescription: { type: string }
        published: { type: boolean }
        canonicalUrl: { type: [string, 'null'], format: uri }
        robots: { type: string, enum: ['noindex,follow', 'index,follow'] }
        snapshotId: { oneOf: [{ $ref: '#/components/schemas/Id' }, { type: 'null' }] }
        publishedRevision: { type: [integer, 'null'], minimum: 0 }
        publishedAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
        hasUnpublishedChanges: { type: boolean }
    PublicationSettingsUpdate:
      type: object
      required: [visibility, slug, showAuthor]
      properties:
        visibility: { $ref: '#/components/schemas/Visibility' }
        slug: { type: string, pattern: '^[a-z0-9](?:[a-z0-9-]{1,46}[a-z0-9])$', minLength: 3, maxLength: 48 }
        showAuthor: { type: boolean }
        seoTitle: { type: string, maxLength: 70 }
        seoDescription: { type: string, maxLength: 160 }
    PublishRequest:
      type: object
      required: [expectedRevision]
      properties:
        expectedRevision: { type: integer, minimum: 0 }
    PublishedPage:
      type: object
      required: [id, snapshotId, kind, title, description, slug, visibility, owner, settings, categories, publishedAt, etag]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        snapshotId: { $ref: '#/components/schemas/Id' }
        kind: { $ref: '#/components/schemas/PageKind' }
        title: { type: string }
        description: { type: string }
        slug: { type: string }
        visibility: { type: string, enum: [unlisted, public] }
        owner:
          type: object
          required: [name, avatarUrl, visible]
          properties:
            name: { type: string }
            avatarUrl: { type: string }
            visible: { type: boolean }
        settings: { $ref: '#/components/schemas/PageSettings' }
        categories: { type: array, items: { $ref: '#/components/schemas/PublicCategory' } }
        subdomain: { type: [string, 'null'] }
        publishedAt: { $ref: '#/components/schemas/Timestamp' }
        etag: { type: string }
    Theme:
      type: object
      required: [id, name, version, author, description, mode, preview, enabled, default]
      properties:
        id: { $ref: '#/components/schemas/ThemeId' }
        name: { type: string }
        version: { type: string }
        author: { type: string }
        description: { type: string }
        mode: { type: string, enum: [light, dark, both] }
        preview: { type: string }
        enabled: { type: boolean }
        default: { type: boolean }
    DiscoverPage:
      type: object
      required: [slug, title, description, ownerName, themeId, tags, publishedAt]
      properties:
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        ownerName: { type: string }
        themeId: { $ref: '#/components/schemas/ThemeId' }
        tags: { type: array, items: { type: string } }
        featured: { type: boolean }
        viewCount: { type: integer, minimum: 0 }
        publishedAt: { $ref: '#/components/schemas/Timestamp' }
    DirectoryCategory:
      type: object
      required: [id, name, icon, sortOrder, enabled, siteCount]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        enabled: { type: boolean }
        siteCount: { type: integer, minimum: 0 }
    DirectorySite:
      type: object
      required: [id, categoryId, categoryName, title, url, icon, description, sortOrder, enabled]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        categoryId: { $ref: '#/components/schemas/Id' }
        categoryName: { type: string }
        title: { type: string }
        url: { type: string, format: uri }
        icon: { type: string }
        description: { type: string }
        sortOrder: { type: integer }
        enabled: { type: boolean }
    DirectoryCategoryInput:
      type: object
      required: [name, icon, enabled]
      properties:
        name: { type: string, minLength: 1, maxLength: 60 }
        icon: { type: string, maxLength: 256 }
        enabled: { type: boolean }
    DirectorySiteInput:
      allOf:
        - $ref: '#/components/schemas/SiteInput'
        - type: object
          required: [enabled]
          properties:
            enabled: { type: boolean }
    DirectorySitePatch:
      type: object
      properties:
        categoryId: { $ref: '#/components/schemas/Id' }
        title: { type: string, minLength: 1, maxLength: 100 }
        url: { type: string, format: uri, pattern: '^https?://' }
        icon: { type: string, maxLength: 2048 }
        description: { type: string, maxLength: 300 }
        enabled: { type: boolean }
      minProperties: 1
    PublicEventRequest:
      type: object
      required: [type, pageId]
      properties:
        type: { type: string, enum: [page_view, site_click] }
        pageId: { $ref: '#/components/schemas/Id' }
        snapshotId: { $ref: '#/components/schemas/Id' }
        siteId: { $ref: '#/components/schemas/Id' }
        clientEventId: { type: string, maxLength: 128 }
    ImportPreview:
      type: object
      required: [importToken, expiresAt, categories, totals]
      properties:
        importToken: { type: string }
        expiresAt: { $ref: '#/components/schemas/Timestamp' }
        categories: { type: array, items: { $ref: '#/components/schemas/ImportCategory' } }
        totals:
          type: object
          required: [categories, sites, duplicates, invalid]
          properties:
            categories: { type: integer, minimum: 0 }
            sites: { type: integer, minimum: 0 }
            duplicates: { type: integer, minimum: 0 }
            invalid: { type: integer, minimum: 0 }
    ImportCategory:
      type: object
      required: [sourceId, name, sites]
      properties:
        sourceId: { type: string }
        name: { type: string }
        sites:
          type: array
          items:
            type: object
            required: [sourceId, title, url, duplicate, valid]
            properties:
              sourceId: { type: string }
              title: { type: string }
              url: { type: string }
              duplicate: { type: boolean }
              valid: { type: boolean }
              error: { type: string }
    ImportCommitRequest:
      type: object
      required: [importToken, mode, selectedSiteIds, expectedRevision]
      properties:
        importToken: { type: string, minLength: 16, maxLength: 256 }
        mode: { type: string, enum: [merge, replace] }
        selectedSiteIds: { type: array, uniqueItems: true, items: { type: string } }
        expectedRevision: { type: integer, minimum: 0 }
    ImportResult:
      type: object
      required: [categoriesCreated, sitesCreated, duplicatesSkipped, invalidSkipped, draftRevision]
      properties:
        categoriesCreated: { type: integer, minimum: 0 }
        sitesCreated: { type: integer, minimum: 0 }
        duplicatesSkipped: { type: integer, minimum: 0 }
        invalidSkipped: { type: integer, minimum: 0 }
        draftRevision: { type: integer, minimum: 0 }
    PortableExport:
      type: object
      required: [format, version, exportedAt, page]
      properties:
        format: { const: navax-export }
        version: { const: 1 }
        exportedAt: { $ref: '#/components/schemas/Timestamp' }
        page: { $ref: '#/components/schemas/NavigationPage' }
    LinkCheckRequest:
      type: object
      required: [siteIds]
      properties:
        siteIds: { type: array, minItems: 1, maxItems: 50, uniqueItems: true, items: { $ref: '#/components/schemas/Id' } }
    LinkCheckResult:
      type: object
      required: [siteId, status, checkedAt]
      properties:
        siteId: { $ref: '#/components/schemas/Id' }
        status: { type: string, enum: [reachable, unreachable, blocked, timeout] }
        httpStatus: { type: [integer, 'null'], minimum: 100, maximum: 599 }
        latencyMs: { type: [integer, 'null'], minimum: 0 }
        checkedAt: { $ref: '#/components/schemas/Timestamp' }
        message: { type: string }
    Asset:
      type: object
      required: [id, kind, url, mimeType, size, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        kind: { type: string, enum: [avatar, background, site-icon] }
        url: { type: string, format: uri-reference }
        mimeType: { type: string }
        size: { type: integer, minimum: 1 }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
    SubdomainStatus: { type: string, enum: [pending, approved, rejected, revoked] }
    Subdomain:
      type: object
      description: 子域名记录。标准子域名可由系统自动批准，此时 reviewedAt 为自动启用时间。
      required: [id, userId, label, fullDomain, status, appliedAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        userId: { $ref: '#/components/schemas/Id' }
        username: { type: string }
        label: { type: string }
        fullDomain: { type: string }
        status: { $ref: '#/components/schemas/SubdomainStatus' }
        appliedAt: { $ref: '#/components/schemas/Timestamp' }
        reviewedAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
        reason: { type: string }
    SubdomainRequestInput:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: 1 至 30 个小写字母、数字或连字符；不能以连字符开头或结尾。4 个及以上字符自动通过，1 至 3 个字符需审核。
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,28}[a-z0-9])?$'
          minLength: 1
          maxLength: 30
    SubdomainReviewRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approve, reject, revoke] }
        reason: { type: string, maxLength: 300 }
    AnalyticsOverview:
      type: object
      required: [totalPV, totalUV, todayPV, todayUV, bounceRate, averagePages]
      properties:
        totalPV: { type: integer, minimum: 0 }
        totalUV: { type: integer, minimum: 0 }
        todayPV: { type: integer, minimum: 0 }
        todayUV: { type: integer, minimum: 0 }
        pvChange: { type: number }
        uvChange: { type: number }
        bounceRate: { type: number, minimum: 0, maximum: 1 }
        averagePages: { type: number, minimum: 0 }
    DailyStat:
      type: object
      required: [date, pv, uv]
      properties:
        date: { type: string, format: date }
        pv: { type: integer, minimum: 0 }
        uv: { type: integer, minimum: 0 }
    AnalyticsBreakdown:
      type: object
      required: [topSites, categories, devices, referrers, recentVisits]
      properties:
        topSites: { type: array, items: { $ref: '#/components/schemas/MetricBucket' } }
        categories: { type: array, items: { $ref: '#/components/schemas/MetricBucket' } }
        devices: { type: array, items: { $ref: '#/components/schemas/MetricBucket' } }
        referrers: { type: array, items: { $ref: '#/components/schemas/MetricBucket' } }
        recentVisits:
          type: array
          items:
            type: object
            required: [anonymousId, device, visitedAt]
            properties:
              anonymousId: { type: string }
              device: { type: string }
              referrerDomain: { type: string }
              visitedAt: { $ref: '#/components/schemas/Timestamp' }
    MetricBucket:
      type: object
      required: [key, label, value]
      properties:
        key: { type: string }
        label: { type: string }
        value: { type: integer, minimum: 0 }
    AdminOverview:
      type: object
      required: [totalUsers, activeUsers, activeInvitations, publicPages, health]
      properties:
        totalUsers: { type: integer, minimum: 0 }
        activeUsers: { type: integer, minimum: 0 }
        activeInvitations: { type: integer, minimum: 0 }
        publicPages: { type: integer, minimum: 0 }
        health: { $ref: '#/components/schemas/SystemHealth' }
        recentActions: { type: array, items: { $ref: '#/components/schemas/AuditEntry' } }
    SystemHealth:
      type: object
      required: [status, uptimeSeconds, version, goVersion, memoryBytes]
      properties:
        status: { type: string, enum: [healthy, degraded] }
        uptimeSeconds: { type: integer, minimum: 0 }
        version: { type: string }
        goVersion: { type: string }
        memoryBytes: { type: integer, minimum: 0 }
    Invitation:
      type: object
      required: [id, tokenPreview, maxUses, usedCount, expiresAt, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        tokenPreview: { type: string }
        creatorName: { type: string }
        email: { type: [string, 'null'], format: email }
        maxUses: { type: integer, minimum: 1 }
        usedCount: { type: integer, minimum: 0 }
        expiresAt: { $ref: '#/components/schemas/Timestamp' }
        revokedAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
    InvitationCreateRequest:
      type: object
      required: [maxUses, expiresInDays]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        maxUses: { type: integer, minimum: 1, maximum: 100, default: 1 }
        expiresInDays: { type: integer, minimum: 1, maximum: 365 }
        sendEmail: { type: boolean, default: false }
    InvitationCreated:
      allOf:
        - $ref: '#/components/schemas/Invitation'
        - type: object
          required: [token, inviteUrl]
          properties:
            token: { type: string }
            inviteUrl: { type: string, format: uri }
    SystemSettings:
      type: object
      required: [instanceName, publicBaseUrl, registrationMode, limits, analytics, domain]
      properties:
        instanceName: { type: string }
        publicBaseUrl: { type: string, format: uri }
        registrationMode: { type: string, enum: [invite, closed] }
        limits: { $ref: '#/components/schemas/Limits' }
        analytics:
          type: object
          required: [enabled, retentionDays]
          properties:
            enabled: { type: boolean }
            retentionDays: { type: integer, minimum: 7, maximum: 365 }
        domain:
          type: object
          required: [subdomainsEnabled]
          properties:
            rootDomain: { type: [string, 'null'] }
            subdomainsEnabled: { type: boolean }
    SystemSettingsPatch:
      type: object
      properties:
        instanceName: { type: string, minLength: 1, maxLength: 60 }
        publicBaseUrl: { type: string, format: uri, maxLength: 2048 }
        registrationMode: { type: string, enum: [invite, closed] }
        limits: { $ref: '#/components/schemas/Limits' }
        analytics: { type: object, properties: { enabled: { type: boolean }, retentionDays: { type: integer, minimum: 7, maximum: 365 } } }
        domain: { type: object, properties: { rootDomain: { type: [string, 'null'] }, subdomainsEnabled: { type: boolean } } }
      minProperties: 1
    Limits:
      type: object
      required: [maxCategoriesPerPage, maxSitesPerPage, maxUploadBytes]
      properties:
        maxCategoriesPerPage: { type: integer, minimum: 1, maximum: 500 }
        maxSitesPerPage: { type: integer, minimum: 1, maximum: 10000 }
        maxUploadBytes: { type: integer, minimum: 1024, maximum: 52428800 }
    AdminLink:
      allOf:
        - $ref: '#/components/schemas/Site'
        - type: object
          required: [ownerId, ownerName, categoryName]
          properties:
            ownerId: { $ref: '#/components/schemas/Id' }
            ownerName: { type: string }
            categoryName: { type: string }
    AuditEntry:
      type: object
      required: [id, actorId, actorName, action, targetType, targetId, detail, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        actorId: { $ref: '#/components/schemas/Id' }
        actorName: { type: string }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: string }
        detail: { type: string }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
    ProviderKind: { type: string, enum: [smtp, storage, dns] }
    ProviderSummary:
      type: object
      required: [kind, enabled, configured, hasSecret, updatedAt]
      properties:
        kind: { $ref: '#/components/schemas/ProviderKind' }
        enabled: { type: boolean }
        configured: { type: boolean }
        hasSecret: { type: boolean }
        updatedAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
    ProviderConfig:
      allOf:
        - $ref: '#/components/schemas/ProviderSummary'
        - type: object
          required: [settings]
          properties:
            settings: { type: object, additionalProperties: true, description: 仅返回非秘密字段 }
    ProviderConfigUpdate:
      type: object
      required: [enabled, settings]
      properties:
        enabled: { type: boolean }
        settings:
          oneOf:
            - $ref: '#/components/schemas/SmtpSettings'
            - $ref: '#/components/schemas/StorageSettings'
            - $ref: '#/components/schemas/DnsSettings'
        secrets:
          type: object
          additionalProperties: { type: string, writeOnly: true }
          description: 空字符串表示保留旧值，null/缺省不变；秘密永不回传。
    SmtpSettings:
      type: object
      required: [host, port, tlsMode, username, fromName, fromAddress]
      properties:
        host: { type: string, maxLength: 255 }
        port: { type: integer, minimum: 1, maximum: 65535 }
        tlsMode: { type: string, enum: [none, starttls, tls] }
        username: { type: string, maxLength: 255 }
        fromName: { type: string, maxLength: 100 }
        fromAddress: { type: string, format: email }
    StorageSettings:
      type: object
      required: [driver]
      properties:
        driver: { type: string, enum: [local, s3] }
        endpoint: { type: string, maxLength: 2048 }
        region: { type: string, maxLength: 100 }
        bucket: { type: string, maxLength: 255 }
        prefix: { type: string, maxLength: 255 }
        pathStyle: { type: boolean }
        accessKey: { type: string, maxLength: 255 }
        publicBaseUrl: { type: string, format: uri, maxLength: 2048 }
    DnsSettings:
      type: object
      required: [provider, zoneId, ttl]
      properties:
        provider: { type: string, maxLength: 50 }
        zoneId: { type: string, maxLength: 255 }
        apiEndpoint: { type: string, format: uri, maxLength: 2048 }
        ttl: { type: integer, minimum: 60, maximum: 86400 }
    ProviderTestResult:
      type: object
      required: [success, durationMs, message]
      properties:
        success: { type: boolean }
        durationMs: { type: integer, minimum: 0 }
        message: { type: string }
    UpdateState:
      type: object
      required: [currentVersion, deployment, channel, autoCheck, autoApply, status]
      properties:
        currentVersion: { type: string }
        latestVersion: { type: [string, 'null'] }
        deployment: { type: string, enum: [binary, container, development] }
        channel: { type: string, enum: [stable] }
        autoCheck: { type: boolean }
        autoApply: { type: boolean }
        maintenanceWindow: { type: [string, 'null'], description: 'HH:MM-HH:MM' }
        status: { type: string, enum: [idle, checking, available, downloading, applying, restart-required, failed] }
        releaseNotes: { type: string }
        checkedAt: { oneOf: [{ $ref: '#/components/schemas/Timestamp' }, { type: 'null' }] }
        error: { type: string }
    UpdateSettingsPatch:
      type: object
      properties:
        autoCheck: { type: boolean }
        autoApply: { type: boolean }
        maintenanceWindow: { type: [string, 'null'], pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]-([01][0-9]|2[0-3]):[0-5][0-9]$' }
      minProperties: 1
    Backup:
      type: object
      required: [id, reason, size, sha256, createdAt]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        reason: { type: string, enum: [manual, pre-update, scheduled] }
        size: { type: integer, minimum: 0 }
        sha256: { type: string, pattern: '^[a-f0-9]{64}$' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }

