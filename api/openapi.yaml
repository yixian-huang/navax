    BackupsEnvelope: { allOf: [{ $ref: '#/components/schemas/EnvelopeBase' }, { type: object, properties: { data: { type: array, items: { $ref: '#/components/schemas/Backup' } } }, required: [data] }] }
    RestoreTokenEnvelope: { allOf: [{ $ref: '#/components/schemas/EnvelopeBase' }, { type: object, properties: { data: { type: object, required: [restoreToken, expiresAt], properties: { restoreToken: { type: string }, expiresAt: { $ref: '#/components/schemas/Timestamp' } } } }, required: [data] }] }
    EnvelopeBase:
      type: object
      required: [code, meta]
      properties:
        code: { const: OK }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    PaginatedEnvelopeBase:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            meta:
              allOf:
                - $ref: '#/components/schemas/ResponseMeta'
                - type: object
                  required: [page, pageSize, total, totalPages]
                  properties:
                    page: { type: integer, minimum: 1 }
                    pageSize: { type: integer, minimum: 1 }
                    total: { type: integer, minimum: 0 }
                    totalPages: { type: integer, minimum: 0 }
