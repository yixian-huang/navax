openapi: 3.1.0
info:
  title: nav.ax API
  version: 1.0.0
  summary: nav.ax 导航站 v1 前后端唯一接口契约
  description: |
    所有时间均为 UTC RFC 3339，所有 ID 均为不透明字符串。
    认证采用 HttpOnly Session Cookie；认证后的非安全方法还必须通过 Origin 校验。
    成功响应统一为 `{code,data,meta}`，错误响应的 `data` 固定为 null。
servers:
  - url: /
tags:
  - { name: System, description: 健康、版本与首次初始化 }
  - { name: Public, description: 无需认证的公开资源 }
  - { name: Auth, description: 认证与账号 }
  - { name: Pages, description: 导航草稿、设置与发布 }
  - { name: Data, description: 导入、导出、资源与链接检查 }
  - { name: Analytics, description: 隐私友好的访问统计 }
  - { name: Admin, description: 运营管理 }
  - { name: Providers, description: 第三方服务配置 }
  - { name: Maintenance, description: 更新与备份 }

paths:
  /healthz:
    get:
      tags: [System]
      operationId: health
      security: []
      responses:
        '200': { $ref: '#/components/responses/HealthResponse' }
  /readyz:
    get:
      tags: [System]
      operationId: readiness
      security: []
      responses:
        '200': { $ref: '#/components/responses/HealthResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/version:
    get:
      tags: [System]
      operationId: getVersion
      security: []
      responses:
        '200': { $ref: '#/components/responses/VersionResponse' }
  /api/v1/bootstrap/status:
    get:
      tags: [System]
      operationId: getBootstrapStatus
      security: []
      responses:
        '200': { $ref: '#/components/responses/BootstrapStatusResponse' }
  /api/v1/bootstrap:
    post:
      tags: [System]
      operationId: bootstrapInstance
      security: []
      parameters:
        - in: header
          name: X-Setup-Token
          required: true
          schema: { type: string, minLength: 32, maxLength: 256 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BootstrapRequest' }
      responses:
        '201': { $ref: '#/components/responses/AuthSessionResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/public/config:
    get:
      tags: [Public]
      operationId: getPublicConfig
      security: []
      responses:
        '200': { $ref: '#/components/responses/PublicConfigResponse' }
  /api/v1/public/home:
    get:
      tags: [Public]
      operationId: getPublicHome
      security: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200': { $ref: '#/components/responses/PublishedPageResponse' }
        '304': { description: 快照未变化 }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/public/pages/{slug}:
    parameters:
      - $ref: '#/components/parameters/Slug'
    get:
      tags: [Public]
      operationId: getPublicPage
      security: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200': { $ref: '#/components/responses/PublishedPageResponse' }
        '304': { description: 快照未变化 }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/public/discover:
    get:
      tags: [Public]
      operationId: discoverPages
      security: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - in: query
          name: tag
          schema: { type: string, maxLength: 40 }
        - in: query
          name: sort
          schema: { type: string, enum: [latest, popular, featured], default: latest }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/DiscoverResponse' }
  /api/v1/public/directory:
    get:
      tags: [Public]
      operationId: getPublicDirectory
      security: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - in: query
          name: categoryId
          schema: { $ref: '#/components/schemas/Id' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/DirectoryResponse' }
  /api/v1/public/events:
    post:
      tags: [Analytics]
      operationId: recordPublicEvent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublicEventRequest' }
      responses:
        '202': { $ref: '#/components/responses/EmptyResponse' }
        '429': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/themes:
    get:
      tags: [Public]
      operationId: listThemes
      security: []
      responses:
        '200': { $ref: '#/components/responses/ThemesResponse' }

  /api/v1/auth/session:
    get:
      tags: [Auth]
      operationId: getAuthSession
      security: []
      responses:
        '200': { $ref: '#/components/responses/AuthSessionResponse' }
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/AuthSessionResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '429': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/auth/invitations/{token}:
    parameters:
      - in: path
        name: token
        required: true
        schema: { type: string, minLength: 24, maxLength: 256 }
    get:
      tags: [Auth]
      operationId: validateInvitation
      security: []
      responses:
        '200': { $ref: '#/components/responses/InvitationValidationResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '410': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/auth/invitations/{token}/register:
    parameters:
      - in: path
        name: token
        required: true
        schema: { type: string, minLength: 24, maxLength: 256 }
    post:
      tags: [Auth]
      operationId: registerWithInvitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { $ref: '#/components/responses/AuthSessionResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '410': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/me/profile:
    get:
      tags: [Auth]
      operationId: getMyProfile
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/UserResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    patch:
      tags: [Auth]
      operationId: updateMyProfile
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfilePatch' }
      responses:
        '200': { $ref: '#/components/responses/UserResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/password:
    patch:
      tags: [Auth]
      operationId: changeMyPassword
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordChangeRequest' }
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/sessions:
    get:
      tags: [Auth]
      operationId: listMySessions
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/SessionsResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/sessions/{sessionId}:
    delete:
      tags: [Auth]
      operationId: revokeMySession
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/pages/current:
    get:
      tags: [Pages]
      operationId: getCurrentPage
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: scope
          required: true
          schema: { type: string, enum: [personal, system] }
          description: system 仅管理员可访问。
      responses:
        '200': { $ref: '#/components/responses/NavigationPageResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags: [Pages]
      operationId: getPageDraft
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/NavigationPageResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
    patch:
      tags: [Pages]
      operationId: updatePageDraft
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PagePatch' }
      responses:
        '200': { $ref: '#/components/responses/NavigationPageResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '412': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/categories:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags: [Pages]
      operationId: listCategories
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/CategoriesResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [Pages]
      operationId: createCategory
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '201': { $ref: '#/components/responses/CategoryResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/categories/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/PageId'
      - $ref: '#/components/parameters/CategoryId'
    patch:
      tags: [Pages]
      operationId: updateCategory
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryPatch' }
      responses:
        '200': { $ref: '#/components/responses/CategoryResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [Pages]
      operationId: deleteCategory
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: mode
          required: true
          schema: { type: string, enum: [reject-if-not-empty, delete-sites, move-to-uncategorized] }
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/sites:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags: [Pages]
      operationId: listSites
      security: [{ sessionCookie: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { $ref: '#/components/schemas/Id' }
        - $ref: '#/components/parameters/Search'
      responses:
        '200': { $ref: '#/components/responses/SitesResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [Pages]
      operationId: createSite
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SiteInput' }
      responses:
        '201': { $ref: '#/components/responses/SiteResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/sites/{siteId}:
    parameters:
      - $ref: '#/components/parameters/PageId'
      - $ref: '#/components/parameters/SiteId'
    patch:
      tags: [Pages]
      operationId: updateSite
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SitePatch' }
      responses:
        '200': { $ref: '#/components/responses/SiteResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [Pages]
      operationId: deleteSite
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/content-order:
    put:
      tags: [Pages]
      operationId: replaceContentOrder
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContentOrderRequest' }
      responses:
        '200': { $ref: '#/components/responses/RevisionResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '412': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/settings:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags: [Pages]
      operationId: getPageSettings
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/PageSettingsResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    put:
      tags: [Pages]
      operationId: replacePageSettings
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PageSettingsUpdate' }
      responses:
        '200': { $ref: '#/components/responses/PageSettingsResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '412': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/preview:
    get:
      tags: [Pages]
      operationId: previewPage
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
      responses:
        '200': { $ref: '#/components/responses/PublishedPageResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/publication:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags: [Pages]
      operationId: getPublication
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/PublicationResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    put:
      tags: [Pages]
      operationId: replacePublicationSettings
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublicationSettingsUpdate' }
      responses:
        '200': { $ref: '#/components/responses/PublicationResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [Pages]
      operationId: unpublishPage
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/PublicationResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/publish:
    post:
      tags: [Pages]
      operationId: publishPage
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublishRequest' }
      responses:
        '200': { $ref: '#/components/responses/PublicationResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '412': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/pages/{pageId}/imports/preview:
    post:
      tags: [Data]
      operationId: previewImport
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [format, file]
              properties:
                format: { type: string, enum: [bookmarks-html, navax-json] }
                file: { type: string, format: binary }
      responses:
        '200': { $ref: '#/components/responses/ImportPreviewResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/imports:
    post:
      tags: [Data]
      operationId: commitImport
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportCommitRequest' }
      responses:
        '200': { $ref: '#/components/responses/ImportResultResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/export:
    get:
      tags: [Data]
      operationId: exportPage
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
        - in: query
          name: format
          required: true
          schema: { type: string, enum: [navax-json, bookmarks-html] }
      responses:
        '200':
          description: 附件下载
          headers:
            Content-Disposition: { schema: { type: string } }
          content:
            application/json: { schema: { $ref: '#/components/schemas/PortableExport' } }
            text/html: { schema: { type: string } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/pages/{pageId}/link-checks:
    post:
      tags: [Data]
      operationId: checkPageLinks
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LinkCheckRequest' }
      responses:
        '200': { $ref: '#/components/responses/LinkCheckResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '429': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/assets:
    post:
      tags: [Data]
      operationId: uploadAsset
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kind, file]
              properties:
                kind: { type: string, enum: [avatar, background, site-icon] }
                file: { type: string, format: binary }
      responses:
        '201': { $ref: '#/components/responses/AssetResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '413': { $ref: '#/components/responses/ErrorResponse' }
        '415': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/subdomain:
    get:
      tags: [Pages]
      operationId: getMySubdomain
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/SubdomainResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [Pages]
      operationId: requestSubdomain
      description: 申请 nav.ax 子域名。4 个及以上字符在名称可用时自动通过；1 至 3 个字符作为稀缺短域名进入管理员审核。
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubdomainRequestInput' }
      responses:
        '201': { $ref: '#/components/responses/SubdomainResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [Pages]
      operationId: cancelSubdomainRequest
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/EmptyResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/me/analytics/overview:
    get:
      tags: [Analytics]
      operationId: getMyAnalyticsOverview
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200': { $ref: '#/components/responses/AnalyticsOverviewResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/analytics/trends:
    get:
      tags: [Analytics]
      operationId: getMyAnalyticsTrends
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200': { $ref: '#/components/responses/AnalyticsTrendsResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/me/analytics/breakdown:
    get:
      tags: [Analytics]
      operationId: getMyAnalyticsBreakdown
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/Period'
      responses:
        '200': { $ref: '#/components/responses/AnalyticsBreakdownResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /api/v1/admin/overview:
    get:
      tags: [Admin]
      operationId: getAdminOverview
      security: [{ sessionCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/AdminOverviewResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /api/v1/admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/Search'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/UserStatus' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200': { $ref: '#/components/responses/UsersResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
